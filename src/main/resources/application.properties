spring.application.name=upd-recognition
server.port=8080

# Ограничения загрузки файлов
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# Временная папка для загружаемых файлов
app.upload.dir=${java.io.tmpdir}/upd-recognition

# Tesseract OCR настройки
# Установите true ТОЛЬКО если Tesseract установлен в системе
app.tesseract.enabled=false
# Путь к tessdata (например: /usr/share/tessdata или C:/Program Files/Tesseract-OCR/tessdata)
app.tesseract.data-path=
# Язык распознавания (rus+eng для русского и английского)
app.tesseract.language=rus+eng

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── AI Gateway (корпоративный, обязателен вместо прямых вызовов OpenAI/Anthropic) ──
# Установите enabled=true и передайте ACCESS_TOKEN через env-переменную
app.gateway.enabled=false
app.gateway.base-url=http://BA-SRV-AI-APP01.mr-group.ru:8080
app.gateway.model=openai/gpt-4.1
# ACCESS_TOKEN задаётся через env-переменную (НЕ хранить в этом файле!):
#   export ACCESS_TOKEN=<keycloak_access_token>

# Логирование
logging.level.com.upd=DEBUG
